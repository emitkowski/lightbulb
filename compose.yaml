services:
    laravel.test:
        build:
            context: './vendor/laravel/sail/runtimes/8.5'
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP}'
        image: 'sail-8.5/app'
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
            IGNITION_LOCAL_SITES_PATH: '${PWD}'
            VIRTUAL_HOST: '${APP_DOMAIN}'
            VIRTUAL_PORT: '80'
            REVERB_CLIENT_HOST: reverb
        volumes:
            - '.:/var/www/html'
            - '/home/eric/code:/home/eric/code'
            - '/home/eric/.nvm:/home/eric/.nvm:ro'
            - '/home/eric/.claude:/home/eric/.claude:ro'
        networks:
            - sail
            - nginx-proxy
            - mysql-shared
            - redis-shared
            - mailpit-shared
    reverb:
        image: 'sail-8.5/app'
        command: php artisan reverb:start
        ports:
            - '${REVERB_PORT:-8080}:${REVERB_PORT:-8080}'
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
            - redis-shared
            - mysql-shared
    queue:
        image: 'sail-8.5/app'
        command: php artisan queue:listen --tries=1 --timeout=0
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
            REVERB_CLIENT_HOST: reverb
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
            - mysql-shared
            - redis-shared
            - mailpit-shared
    vite:
        image: 'node:24-slim'
        working_dir: /var/www/html
        command: npm run dev
        ports:
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
networks:
    sail:
        driver: bridge
    nginx-proxy:
        external: true
    mysql-shared:
        external: true
    redis-shared:
        external: true
    mailpit-shared:
        external: true
